name: ci

# Run the test suite on every pull request and on pushes to main.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# A newer push to the same branch/PR cancels the older, still-running run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches requires-python (>=3.10) and the classifiers in pyproject.toml.
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest
