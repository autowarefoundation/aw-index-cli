name: ci

# Run the test suite on every pull request and on pushes to main.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# A newer push to the same branch/PR cancels the older, still-running run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches requires-python (>=3.10) and the classifiers in pyproject.toml.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  test-js:
    name: test-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run JS unit tests
        run: node --test js/*.test.mjs

  conformance:
    name: conformance (python <-> js)
    needs: [test, test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      # Fail loudly if node is unavailable: the conformance test skips itself
      # when node is absent, which would let this job go green without ever
      # checking parity. This job's whole purpose is to run it.
      - name: Require node for the parity check
        run: node --version

      - name: Assert js/compose.mjs matches the Python compose
        run: python -m pytest tests/test_conformance.py -v
