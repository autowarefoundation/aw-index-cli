name: release

# Publish to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Triggers on a bare-semver tag push, e.g. `0.1.0`, `1.2.0`, `0.3.0rc1`.
# The package version comes from src/aw_index_cli/__init__.py; the build job
# fails fast if the tag and that version disagree, so a tag can never publish
# a mismatched version.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  build:
    name: Build & check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          ver="$(grep -oP '(?<=__version__ = ")[^"]+' src/aw_index_cli/__init__.py)"
          if [ "${GITHUB_REF_NAME}" != "$ver" ]; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not match package __version__ '$ver'"
            exit 1
          fi
          echo "tag matches package version: $ver"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aw-index-cli/
    permissions:
      id-token: write # mandatory for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
